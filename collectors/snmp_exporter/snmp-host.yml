# jemon: snmp_exporter config for HOST-RESOURCES-MIB + UCD-SNMP-MIB (server CPU/mem/disk).
# Mounted into the snmp-exporter-host sidecar. Real net-snmp devices expose these OIDs.
auths:
  public_v2:
    community: public
    version: 2
modules:
  host_resources:
    walk:
      - 1.3.6.1.2.1.25.2.2          # hrMemorySize (scalar)
      - 1.3.6.1.2.1.25.2.3.1        # hrStorageTable
      - 1.3.6.1.2.1.25.3.3.1        # hrProcessorTable
      - 1.3.6.1.4.1.2021.4          # UCD memory
      - 1.3.6.1.4.1.2021.10.1       # UCD load average
      - 1.3.6.1.4.1.2021.11         # UCD systemStats (ssCpu)
    metrics:
      - name: hrMemorySize
        oid: 1.3.6.1.2.1.25.2.2
        type: gauge
        help: Physical main memory size (KBytes)
      - name: hrProcessorLoad
        oid: 1.3.6.1.2.1.25.3.3.1.2
        type: gauge
        help: Per-processor average load percentage (last minute)
        indexes:
          - labelname: hrDeviceIndex
            type: gauge
      - name: hrStorageSize
        oid: 1.3.6.1.2.1.25.2.3.1.5
        type: gauge
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: hrStorageUsed
        oid: 1.3.6.1.2.1.25.2.3.1.6
        type: gauge
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: hrStorageAllocationUnits
        oid: 1.3.6.1.2.1.25.2.3.1.4
        type: gauge
        indexes:
          - labelname: hrStorageIndex
            type: gauge
      - name: memTotalReal
        oid: 1.3.6.1.4.1.2021.4.5
        type: gauge
        help: Total real/physical memory (KBytes, UCD)
      - name: memAvailReal
        oid: 1.3.6.1.4.1.2021.4.6
        type: gauge
        help: Available real/physical memory (KBytes, UCD)
      - name: ssCpuIdle
        oid: 1.3.6.1.4.1.2021.11.11
        type: gauge
        help: CPU idle percentage (UCD)
      - name: laLoadInt
        oid: 1.3.6.1.4.1.2021.10.1.5
        type: gauge
        help: Load average x100 (UCD)
        indexes:
          - labelname: laIndex
            type: gauge
        lookups:
          - labels: [laIndex]
            labelname: laNames
            oid: 1.3.6.1.4.1.2021.10.1.2
            type: DisplayString
