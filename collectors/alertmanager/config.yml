# jemon Alertmanager config. vmalert pushes firing alerts here (replaces blackhole).
# Operator: enable one of the integrations under the 'default' receiver for real delivery.
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # --- Email (fill in and uncomment) ---
