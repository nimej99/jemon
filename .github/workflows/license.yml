name: license-gate
on:
  push: { branches: [ main ] }
  pull_request: {}
jobs:
  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: License allowlist gate
        run: pnpm run check:licenses
      - name: Self-test (must fail on AGPL fixture)
        run: |
          if node scripts/check-licenses.mjs --input scripts/__fixtures__/violation.json; then
            echo 'ERROR: gate did not fail on AGPL fixture'; exit 1
          else
            echo 'OK: gate correctly rejected AGPL fixture'
          fi
