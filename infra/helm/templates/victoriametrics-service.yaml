apiVersion: v1
kind: Service
metadata:
  name: {{ include "jemon.fullname" . }}-victoriametrics
  labels:
    {{- include "jemon.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  type: {{ .Values.victoriametrics.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "jemon.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: victoriametrics
  ports:
    - name: http
      port: {{ .Values.victoriametrics.service.port }}
      targetPort: http
      protocol: TCP
