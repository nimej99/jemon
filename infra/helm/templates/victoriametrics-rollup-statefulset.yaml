apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "jemon.fullname" . }}-vm-rollup
  labels:
    {{- include "jemon.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics-rollup
spec:
  serviceName: {{ include "jemon.fullname" . }}-vm-rollup
  replicas: {{ .Values.victoriametricsRollup.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "jemon.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: victoriametrics-rollup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "jemon.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: victoriametrics-rollup
    spec:
      containers:
        - name: victoriametrics-rollup
          image: "{{ .Values.victoriametricsRollup.image }}:{{ .Values.victoriametricsRollup.imageTag }}"
          imagePullPolicy: IfNotPresent
          args:
            - "-storageDataPath=/vmdata"
            - "-retentionPeriod={{ .Values.victoriametricsRollup.retention }}"
            - "-httpListenAddr=:{{ .Values.victoriametricsRollup.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.victoriametricsRollup.service.port }}
              protocol: TCP
          volumeMounts:
            - name: vmdata
              mountPath: /vmdata
          resources:
            {{- toYaml .Values.victoriametricsRollup.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: vmdata
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.victoriametricsRollup.storageClass }}
        storageClassName: {{ .Values.victoriametricsRollup.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.victoriametricsRollup.storageSize }}
