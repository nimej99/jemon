apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jemon.fullname" . }}-alertmanager
  labels:
    {{- include "jemon.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
data:
  config.yml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: ['alertname', 'instance']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
        # Operator: configure email_configs or webhook_configs for real delivery.
