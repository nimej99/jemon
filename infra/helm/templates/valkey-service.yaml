apiVersion: v1
kind: Service
metadata:
  name: {{ include "jemon.fullname" . }}-valkey
  labels:
    {{- include "jemon.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: {{ .Values.valkey.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "jemon.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: valkey
  ports:
    - name: redis
      port: {{ .Values.valkey.service.port }}
      targetPort: redis
      protocol: TCP
