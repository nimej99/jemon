apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jemon.fullname" . }}-valkey
  labels:
    {{- include "jemon.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  replicas: {{ .Values.valkey.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "jemon.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "jemon.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: valkey
    spec:
      containers:
        - name: valkey
          image: "{{ .Values.valkey.image }}:{{ .Values.valkey.imageTag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: {{ .Values.valkey.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
